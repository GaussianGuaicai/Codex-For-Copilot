name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      publish_tag:
        description: Existing release tag to retry or republish, for example v1.2.3
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare or create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ github.token }}
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build and publish extension
    needs: release-please
    if: >-
      needs.release-please.outputs.release_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_tag != '')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: marketplace
      url: https://marketplace.visualstudio.com/items?itemName=Gaussian.gaussian-codex-for-copilot
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          CREATED_TAG: ${{ needs.release-please.outputs.tag_name }}
          REQUESTED_TAG: ${{ inputs.publish_tag }}
        run: |
          TAG="${REQUESTED_TAG:-${CREATED_TAG}}"
          if [[ -z "${TAG}" ]]; then
            echo "::error::No release tag was provided or created."
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout released version
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve package version
        id: version
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${VERSION}"
          VSIX="codex-for-copilot-${VERSION}.vsix"

          if [[ "${TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "::error::Tag ${TAG} does not match package.json version ${VERSION}; expected ${EXPECTED_TAG}."
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "vsix=${VSIX}" >> "$GITHUB_OUTPUT"

      - name: Prepare Marketplace manifest
        run: |
          npm pkg set name=gaussian-codex-for-copilot
          npm pkg set publisher=Gaussian

      - name: Check TypeScript
        run: npm run check

      - name: Compile extension
        run: npm run compile

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Package VSIX
        run: npx vsce package --out "${{ steps.version.outputs.vsix }}"

      - name: Validate Microsoft Entra configuration
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=0
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub environment variable ${name} in the marketplace environment."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Sign in to Microsoft Entra ID
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Confirm Marketplace identity
        id: identity
        shell: bash
        run: |
          PROFILE_ID="$(az rest \
            --method get \
            --url https://app.vssps.visualstudio.com/_apis/profile/profiles/me \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query id \
            --output tsv)"

          if [[ -z "${PROFILE_ID}" ]]; then
            echo "::error::Microsoft Entra login succeeded, but no Azure DevOps identity profile ID was returned."
            exit 1
          fi

          echo "profile_id=${PROFILE_ID}" >> "$GITHUB_OUTPUT"
          echo "Marketplace identity profile ID: \`${PROFILE_ID}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to VS Code Marketplace
        run: >-
          npx vsce publish
          --packagePath "${{ steps.version.outputs.vsix }}"
          --azure-credential
          --skip-duplicate

      - name: Upload VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VSIX: ${{ steps.version.outputs.vsix }}
        run: gh release upload "${TAG}" "${VSIX}" --clobber

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: gh release edit "${TAG}" --draft=false --latest
